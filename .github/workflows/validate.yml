name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # brands is only required for the HACS default store; we'll add the
          # home-assistant/brands entry at submission time.
          ignore: brands
        env:
          # Let HACS authenticate content fetches (needed while the repo is
          # private; harmless once public).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
