    \ var(--av-card-border) !important;\n    box-shadow: var(--shadow-glass) !important;\n    backdrop-filter:\
    \ var(--av-card-blur);\n    -webkit-backdrop-filter: var(--av-card-blur);\n    --hvac-text: var(--primary-text-color)\
    \ !important;\n    --hvac-muted: var(--secondary-text-color) !important;\n    --hvac-soft: color-mix(in\
    \ srgb, var(--primary-text-color) 8%, transparent) !important;\n    --hvac-soft-2: color-mix(in srgb,\
    \ var(--primary-text-color) 14%, transparent) !important;\n    --hvac-circle: color-mix(in srgb, var(--primary-text-color)\
    \ 18%, transparent) !important;\n    --hvac-scale: color-mix(in srgb, var(--primary-text-color) 35%,\
    \ transparent) !important;\n    --hvac-fade: var(--av-hvac-fade) !important;\n    --hvac-ring-shadow:\
    \ rgba(0, 0, 0, 0.15) !important;\n  }\nhui-heading-card:\n  $: |\n    .container {\n      padding:\
    \ 0 !important;\n    }\n    h1, h2, h3 {\n      color: var(--primary-text-color) !important;\n   \
    \   font-weight: 700 !important;\n      letter-spacing: -0.02em !important;\n    }\n    .badges {\n\
    \      color: var(--secondary-text-color) !important;\n    }\nhui-button-card:\n  $: |\n    ha-card\
    \ {\n      aspect-ratio: 1 / 1;\n      min-height: 0 !important;\n      display: flex !important;\n\
    \    }\n    .grid {\n      grid-template-rows: 1fr min-content min-content !important;\n      align-content:\
    \ center !important;\n      justify-content: start !important;\n      padding: 16px !important;\n\
    \    }\n    ha-state-icon {\n      color: var(--primary-text-color) !important;\n      --mdc-icon-size:\
    \ 28px;\n      opacity: .9;\n    }\n    .name {\n      color: var(--primary-text-color) !important;\n\
    \      font-size: 14px !important;\n      font-weight: 600 !important;\n      justify-self: start\
