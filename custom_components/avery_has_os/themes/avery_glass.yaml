  card-mod-view-yaml: "hui-sections-view:\n  $: |\n    .container {\n      gap: 14px !important;\n   \
    \ }\n    .sections {\n      gap: 14px !important;\n    }\nhui-section:\n  $: |\n    .container {\n\
    \      gap: 10px !important;\n    }\n"
  card-mod-root-yaml: ".: |\n  app-toolbar {\n    background: var(--av-toolbar-bg) !important;\n    backdrop-filter:\
    \ blur(18px);\n    -webkit-backdrop-filter: blur(18px);\n    border-bottom: 1px solid var(--glass-border-subtle);\n\
    \    color: var(--primary-text-color) !important;\n  }\n  hui-view {\n    background: transparent\
    \ !important;\n  }\n"
  card-mod-card-yaml: ".: |\n  ha-card {\n    /* glass surface recipe; tint/border/blur come from the\
    \ per-variant\n       --av-card-* vars, reflection sheen as a background layer */\n    background:\
    \ var(--reflection-top), var(--av-card-bg) !important;\n    border: 1px solid var(--av-card-border)\
    \ !important;\n    box-shadow: var(--shadow-glass) !important;\n    backdrop-filter: var(--av-card-blur);\n\
    \    -webkit-backdrop-filter: var(--av-card-blur);\n    color: var(--primary-text-color) !important;\n\
    \    overflow: hidden;\n    transition: background 180ms, box-shadow 180ms, border-color 180ms;\n\
    \  }\n  ha-card:hover {\n    border-color: var(--glass-border-bright) !important;\n    box-shadow:\
    \ var(--shadow-float) !important;\n  }\n  ha-card .card-header,\n  ha-card h1,\n  ha-card h2,\n  ha-card\
    \ h3 {\n    color: var(--primary-text-color) !important;\n    font-weight: 700 !important;\n    letter-spacing:\
    \ -0.01em;\n  }\navery-hvac-dial-card$: |\n  ha-card {\n    /* embedded dial paints an opaque navy\
    \ slab; re-skin it with the same\n       glass surface and route its palette through the theme vars\
    \ */\n    background: var(--reflection-top), var(--av-card-bg) !important;\n    border: 1px solid\
    \ var(--av-card-border) !important;\n    box-shadow: var(--shadow-glass) !important;\n    backdrop-filter:\
    \ var(--av-card-blur);\n    -webkit-backdrop-filter: var(--av-card-blur);\n    --hvac-text: var(--primary-text-color)\
    \ !important;\n    --hvac-muted: var(--secondary-text-color) !important;\n    --hvac-soft: color-mix(in\
    \ srgb, var(--primary-text-color) 8%, transparent) !important;\n    --hvac-soft-2: color-mix(in srgb,\
    \ var(--primary-text-color) 14%, transparent) !important;\n    --hvac-circle: color-mix(in srgb, var(--primary-text-color)\
    \ 18%, transparent) !important;\n    --hvac-scale: color-mix(in srgb, var(--primary-text-color) 35%,\
    \ transparent) !important;\n    --hvac-fade: var(--av-hvac-fade) !important;\n    --hvac-ring-shadow:\
    \ rgba(0, 0, 0, 0.15) !important;\n  }\nhui-heading-card:\n  $: |\n    .container {\n      padding:\
    \ 0 !important;\n    }\n    h1, h2, h3 {\n      color: var(--primary-text-color) !important;\n   \
    \   font-weight: 700 !important;\n      letter-spacing: -0.02em !important;\n    }\n    .badges {\n\
    \      color: var(--secondary-text-color) !important;\n    }\nhui-button-card:\n  $: |\n    ha-card\
    \ {\n      aspect-ratio: 1 / 1;\n      min-height: 0 !important;\n      display: flex !important;\n\
    \    }\n    .grid {\n      grid-template-rows: 1fr min-content min-content !important;\n      align-content:\
    \ center !important;\n      justify-content: start !important;\n      padding: 16px !important;\n\
    \    }\n    ha-state-icon {\n      color: var(--primary-text-color) !important;\n      --mdc-icon-size:\
    \ 28px;\n      opacity: .9;\n    }\n    .name {\n      color: var(--primary-text-color) !important;\n\
    \      font-size: 14px !important;\n      font-weight: 600 !important;\n      justify-self: start\
    \ !important;\n    }\n    .state {\n      color: var(--secondary-text-color) !important;\n      font-size:\
    \ 12.5px !important;\n      font-weight: 500 !important;\n      justify-self: start !important;\n\
    \    }\nhui-grid-card:\n  $: |\n    #root {\n      gap: 10px !important;\n    }\n"
  av-card-blur: var(--blur-md)
