# ════════════════════════════════════════════════════════════════════════════
# Avery Glass theme family — GENERATED, edit via Claude (source of truth is the
# generator in git history / config/www/mockups/glass-lights-mockup.html).
# Four surface variants from the Liquid Glass UI kit, each with light + dark
# modes (follows HA dark-mode setting):
#   Avery Frosted Glass — heavy blur(32px), standard white tint
#   Avery Dark Glass    — blur(18px), dark tint, hairline border
#   Avery Bright Glass  — blur(18px), extra-opaque tint, bright border
#   Avery Liquid Glass  — extreme blur(60px), ethereal tint
# Pen tokens (--glass-*, --accent-*, --blur-*, --reflection-*) are exposed for
# custom cards. Card surface = --av-card-bg / --av-card-border / --av-card-blur.
# ════════════════════════════════════════════════════════════════════════════

