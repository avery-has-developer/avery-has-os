Avery:
  modes:
    dark:
      dummy_variable1: '1'

  # ── Fonts ────────────────────────────────────────────────────────────────
  primary-font-family: 'Raleway, sans-serif'
  ha-font-family-heading: 'var(--primary-font-family)'
  ha-font-family-body: 'var(--primary-font-family)'
  ha-font-family-code: 'Raleway, sans-serif'
  ha-font-family-longform: 'Raleway, sans-serif'
  ha-card-header-font-family: 'var(--primary-font-family)'

  # ── Palette ──────────────────────────────────────────────────────────────
  # Backgrounds
  background-color: '#151c2c'
  primary-background-color: 'var(--background-color)'
  secondary-background-color: '#1c2438'
  background-color-2: '#111827'

  # Cards
  ha-card-background: 'rgba(28, 36, 54, 0.98)'
  card-background-color: 'var(--ha-card-background)'
  paper-card-background-color: 'var(--ha-card-background)'
  ha-card-box-shadow: '0 4px 24px rgba(21, 28, 44, 0.9)'
  ha-card-border-radius: '12px'
  border-radius: '12px'
  ha-card-border-color: 'rgba(255, 255, 255, 0.05)'
  ha-card-border-width: '1px'
  ha-card-header-color: 'var(--primary-text-color)'
  # New HA design system surface tokens
  ha-color-surface-default: 'var(--ha-card-background)'
  ha-color-on-surface-default: 'var(--primary-text-color)'

  # Accent
  accent-color: '#5B9CF6'
  primary-color: 'var(--accent-color)'
  dark-primary-color: 'var(--accent-color)'
  accent-medium-color: 'var(--accent-color)'
  clear-background-color: 'var(--accent-color)'

  # RGB for bubble card glow etc.
  rgb-state-default-color: '91, 156, 246'
  rgb-accent-color: 'var(--rgb-state-default-color)'

  # ── Text ─────────────────────────────────────────────────────────────────
  text-color: '#E2E8F0'
  primary-text-color: 'var(--text-color)'
  text-primary-color: 'var(--text-color)'
  secondary-text-color: '#94A3B8'
  text-medium-light-color: '#64748B'
  text-medium-color: '#475569'
  disabled-text-color: '#334155'
  text-light-primary-color: 'var(--text-color)'
  # New HA design system text tokens
  ha-color-text-primary: 'var(--primary-text-color)'
  ha-color-text-secondary: 'var(--secondary-text-color)'
  ha-color-text-disabled: 'var(--disabled-text-color)'

  # ── Dividers ─────────────────────────────────────────────────────────────
  divider-color: 'rgba(255, 255, 255, 0.35)'

  # ── App Header ───────────────────────────────────────────────────────────
  app-header-background-color: '#111827'
  header-height: '48px'

  # ── Sidebar ──────────────────────────────────────────────────────────────
  sidebar-background-color: '#111827'
  sidebar-icon-color: '#64748B'
  sidebar-selected-icon-color: 'var(--accent-color)'
  sidebar-selected-text-color: 'var(--text-color)'
  paper-listbox-background-color: 'var(--sidebar-background-color)'

  # ── Icons ────────────────────────────────────────────────────────────────
  paper-item-icon-color: '#CBD5E1'
  paper-item-icon-active-color: 'var(--accent-color)'
  paper-item-selected_-_background-color: 'var(--background-color)'
  state-icon-color: 'var(--secondary-text-color)'
  state-active-color: 'var(--accent-color)'

  # ── State colours ────────────────────────────────────────────────────────
  state-red-color: '#F87171'
  state-green-color: '#34D399'
  state-orange-color: '#FBBF24'
  state-alarm_control_panel-armed_away-color: 'var(--state-green-color)'
  state-alarm_control_panel-armed_home-color: 'var(--state-green-color)'
  state-alarm_control_panel-armed_night-color: 'var(--state-green-color)'
  state-alarm_control_panel-arming-color: 'var(--state-orange-color)'
  state-alarm_control_panel-triggered-color: 'var(--state-red-color)'
  state-binary_sensor-active-color: 'var(--accent-color)'
  state-binary_sensor-battery-on-color: 'var(--state-red-color)'
  state-binary_sensor-moisture-on-color: 'var(--state-red-color)'
  state-binary_sensor-smoke-on-color: 'var(--state-red-color)'
  state-climate-heat-color: 'var(--state-orange-color)'
  state-light-active-color: 'var(--accent-color)'
  state-switch-active-color: 'var(--accent-color)'
  state-media_player-active-color: 'var(--accent-color)'
  state-person-home-color: 'var(--state-green-color)'
  state-sensor-battery-low-color: 'var(--state-red-color)'
  state-sensor-battery-medium-color: 'var(--state-orange-color)'

  # ── Inputs & Forms ───────────────────────────────────────────────────────
  mdc-checkbox-unchecked-color: 'var(--secondary-text-color)'
  mdc-checkbox-disable-color: 'var(--disabled-text-color)'
  mdc-text-field-fill-color: 'rgba(0, 0, 0, 0)'
  mdc-text-field-ink-color: 'var(--text-color)'
  mdc-select-fill-color: 'var(--secondary-background-color)'
  mdc-select-ink-color: 'var(--primary-text-color)'
  mdc-select-label-ink-color: 'var(--secondary-text-color)'
  mdc-select-idle-line-color: 'var(--secondary-text-color)'
  mdc-select-dropdown-icon-color: 'var(--secondary-text-color)'
  mdc-select-hover-line-color: 'var(--accent-color)'
  mdc-text-field-label-ink-color: 'var(--secondary-text-color)'
  input-fill-color: 'rgba(0, 0, 0, 0)'
  input-ink-color: 'var(--primary-text-color)'
  input-label-ink-color: 'var(--secondary-text-color)'
  input-idle-line-color: 'var(--secondary-text-color)'
  input-hover-line-color: 'var(--primary-text-color)'
  input-disabled-fill-color: 'rgba(0, 0, 0, 0)'
  input-disabled-ink-color: 'var(--secondary-text-color)'
  input-disabled-label-ink-color: 'var(--disabled-text-color)'
  input-disabled-line-color: 'var(--disabled-text-color)'
  input-dropdown-icon-color: 'var(--primary-text-color)'
  input-outlined-idle-border-color: 'var(--disabled-text-color)'
  input-outlined-hover-border-color: 'var(--disabled-text-color)'
  input-outlined-disabled-border-color: 'var(--disabled-text-color)'
  ha-color-fill-primary-normal-resting: 'var(--secondary-background-color)'
  ha-color-fill-primary-normal-hover: 'var(--background-color)'
  ha-color-fill-neutral-quiet-resting: 'var(--card-background-color)'
  ha-color-fill-neutral-quiet-hover: 'rgba(255, 255, 255, 0.05)'
  ha-color-fill-primary-quiet-resting: 'var(--background-color)'
  ha-color-fill-primary-quiet-hover: 'rgba(255, 255, 255, 0.03)'
  ha-color-form-background: 'var(--background-color)'
  ha-color-form-background-hover: 'var(--ha-card-background)'
  ha-color-form-background-disabled: 'rgba(255, 255, 255, 0.02)'
  # New HA design system border tokens (for outlined inputs and surfaces)
  ha-color-border-neutral-quiet: 'var(--disabled-text-color)'
  ha-color-border-neutral-normal: 'var(--text-medium-light-color)'

  # ── Toggles & Sliders ────────────────────────────────────────────────────
  paper-toggle-button-checked-bar-color: 'var(--accent-color)'
  paper-toggle-button-checked-ink-color: 'var(--accent-color)'
  paper-toggle-button-unchecked-button-color: 'var(--disabled-text-color)'
  paper-toggle-button-unchecked-bar-color: 'var(--disabled-text-color)'
  mdc-theme-primary: 'var(--accent-color)'
  switch-checked-button-color: 'var(--accent-color)'
  switch-unchecked-color: '#334155'
  switch-unchecked-track-color: 'var(--background-color-2)'
  switch-checked-track-color: 'var(--background-color-2)'
  paper-radio-button-checked-color: 'var(--accent-color)'
  paper-slider-knob-color: 'var(--accent-color)'
  paper-slider-active-color: 'var(--accent-color)'
  paper-slider-container-color: 'var(--background-color-2)'
  paper-slider-secondary-color: 'var(--secondary-background-color)'

  # ── Dialogs & Popups ─────────────────────────────────────────────────────
  ha-dialog-border-radius: '16px'
  paper-dialog-background-color: '#1c2438'
  ha-dialog-scrim-backdrop-filter: 'blur(8px)'
  ha-dialog-surface-background: 'rgba(28, 36, 54, 0.92)'
  mdc-dialog-scrim-color: 'rgba(0, 0, 0, 0.7)'
  more-info-header-background: 'var(--secondary-background-color)'
  popup-border-radius: '12px'

  # ── Tables ───────────────────────────────────────────────────────────────
  table-row-background-color: 'var(--background-color)'
  table-row-alternative-background-color: 'var(--ha-card-background)'

  # ── Badges ───────────────────────────────────────────────────────────────
  label-badge-background-color: 'var(--secondary-background-color)'
  label-badge-text-color: 'var(--text-color)'
  label-badge-red: 'rgba(248, 113, 113, 0.2)'
  label-badge-blue: 'rgba(91, 156, 246, 0.2)'
  label-badge-green: 'rgba(52, 211, 153, 0.2)'
  label-badge-yellow: 'rgba(251, 191, 36, 0.2)'

  # ── Mini Media Player ────────────────────────────────────────────────────
  mini-media-player-base-color: 'var(--text-color)'
  mini-media-player-accent-color: 'var(--accent-color)'
  mini-media-player-button-color: 'var(--ha-card-background)'

  # ── Code Editor ──────────────────────────────────────────────────────────
  code-editor-background-color: 'var(--background-color-2)'

  # ── Glass component tokens (solid fallbacks for non-glass themes) ─────────
  # These match avery_glass.yaml token names so av-btn/av-chip/av-dropdown
  # work on all Avery themes. Glass themes override these with blurred values.
  glass-white: 'rgba(255, 255, 255, 0.07)'
  glass-white-md: 'rgba(255, 255, 255, 0.12)'
  glass-white-lg: 'rgba(255, 255, 255, 0.20)'
  glass-border: 'rgba(255, 255, 255, 0.13)'
  glass-border-subtle: 'rgba(255, 255, 255, 0.07)'
  glass-border-bright: 'rgba(255, 255, 255, 0.28)'
  reflection-top: 'none'
  reflection-inner: 'inset 0 1px 0 rgba(255, 255, 255, 0.08)'
  shadow-glass: '0 4px 16px rgba(0, 0, 0, 0.35)'
  av-dropdown-bg: 'rgba(22, 28, 48, 0.97)'
  av-card-blur: 'none'

  # ── Lovelace layout ──────────────────────────────────────────────────────
  lovelace-horizontal-padding: '10px'
  vertical-stack-card-gap: '8px'
  stack-card-gap: '8px'

  # ── View padding override ─────────────────────────────────────────────────
  card-mod-theme: Avery
  card-mod-view-yaml: |
    hui-sections-view:
      $: |
        :host {
          background: transparent !important;
          background-image: none !important;
        }
        .wrapper {
          margin-left: 8px !important;
          margin-right: 8px !important;
          padding-left: 0px !important;
          padding-right: 0px !important;
        }

